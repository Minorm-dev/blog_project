{% extends 'base.html' %}

{% block content %}
<div id="head">Edit profile</div>
<div id="content">
    <form method="post">
        <input type="text" name="mood" value="{{ user.mood }}" placeholder="Настроение"><br>
        <input type="text" name="style" value="{{ user.style }}" placeholder="Навыки / Стиль"><br>
        <input type="text" name="loving" value="{{ user.loving }}" placeholder="Нравится"><br>
        <button type="submit" class="btn">Save</button>
    </form>
</div>

<hr>

<div class="section-title">My posts</div>

{% for post in posts %}
    <div class="post-card">
        <h4>{{  post.title }}</h4>
        <p>{{ post.content[:100] }}...</p>

        <a href="{{ url_for('posts.edit', id=post.id) }}" class="btn">изменить</a>
    </div>
{% else %}
    <div class="panel"> Нет постов</div>
{% endfor %}
{% endblock %}
