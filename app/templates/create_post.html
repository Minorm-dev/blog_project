{% extends 'base.html' %}

{% block content %}
<div id="head">Create new post</div>
<div id="content">
    <form method="post">
        <input type="text" name="title" placeholder="Title" required>
        <textarea name="content" rows="6" placeholder="Post content..." required></textarea>
        <div style="margin: 8px 0;">
            <input type="checkbox" name="published" id="published" checked>
            <label for="published">Опубликовать сразу</label>
        </div>
        <button type="submit" class="btn">Выложить</button>
    </form>
</div>
{% endblock %}
